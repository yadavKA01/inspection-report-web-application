<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Inspection Report</title>
  <link rel="stylesheet" href="/assets/style.css?v=10" />
  <link rel="stylesheet" href="/assets/auth.css?v=11" />
</head>
<body class="auth-body">
  <div class="auth-card auth-card-login" id="card">
    <div class="login-brand">
      <img class="brand-logo brand-logo--full" src="/assets/smorx-logo-full.png?v=1" alt="SmorX.ai" width="400" height="164" />
      <h1>Inspection Report</h1>
    </div>

    <div id="msg" class="auth-msg"></div>

    <div id="panelLogin">
      <p class="auth-hint">Sign in with the email and password provided by your administrator.</p>

      <label for="loginId">Email or username</label>
      <input type="text" id="loginId" autocomplete="username" placeholder="you@company.com or username" />

      <label for="password">Password</label>
      <div class="password-field">
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
        <button type="button" class="password-toggle" id="btnTogglePassword" aria-pressed="false" aria-label="Show password" title="Show password">Show</button>
      </div>

      <div class="auth-actions">
        <button type="button" id="btnLogin" class="primary">Log in</button>
      </div>
      <p class="auth-small" id="trialNote">Your super admin must grant access before you can use the app.</p>
    </div>
  </div>

  <script src="/assets/auth.js?v=4"></script>
  <script src="/assets/login.js?v=16"></script>
</body>
</html>
